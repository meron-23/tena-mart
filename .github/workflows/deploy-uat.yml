name: ✨ Deploy to UAT Preview Channel

on:
  pull_request:
    types: [opened, reopened, synchronize] # Trigger on PR open, reopen, or new commits

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    name: Build & Deploy UAT Preview
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ✍️ Configure UAT Firebase Config in index.html
        run: |
          echo "Substituting UAT Configuration in index.html..."
          
          # Replace API Key placeholder with UAT secret
          sed -i "s|FIREBASE_API_KEY_PLACEHOLDER|${{ secrets.UAT_FIREBASE_API_KEY }}|g" index.html
          
          # Replace Project ID placeholder with UAT secret (optional, but good practice)
          sed -i "s|FIREBASE_PROJECT_ID_PLACEHOLDER|${{ secrets.UAT_PROJECT_ID }}|g" index.html
          
          # Replace other config placeholders as needed (e.g., authDomain)
          sed -i "s|FIREBASE_AUTH_DOMAIN_PLACEHOLDER|${{ secrets.UAT_AUTH_DOMAIN }}|g" index.html

          # Replace other config placeholders as needed
          sed -i "s|FIREBASE_STORAGE_BUCKET_PLACEHOLDER|${{ secrets.UAT_STORAGE_BUCKET }}|g" index.html
          sed -i "s|FIREBASE_APP_ID_PLACEHOLDER|${{ secrets.UAT_APP_ID }}|g" index.html
          sed -i "s|FIREBASE_MEASUREMENT_ID_PLACEHOLDER|${{ secrets.UAT_MEASUREMENT_ID }}|g" index.html
          sed -i "s|FIREBASE_MESSAGING_SENDERID_PLACEHOLDER|${{ secrets.UAT_MESSAGING_SENDER_ID }}|g" index.html

      - name: 📤 Deploy to Firebase Hosting (Preview Channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_UAT }}
          projectId: ${{ secrets.UAT_PROJECT_ID }}
          # Leaving channelId blank here will automatically create a unique preview channel 
          # named after the PR number (e.g., firebase-preview-pr-123) and comment the URL on the PR.
          