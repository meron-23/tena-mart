name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main # Trigger on push to the main branch

jobs:
  build_and_deploy:
    name: Build & Deploy PROD
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ✍️ Configure Production Firebase Config in index.html
        run: |
          echo "Substituting Production Configuration in index.html..."
          
          # Replace API Key placeholder with PROD secret
          sed -i "s|FIREBASE_API_KEY_PLACEHOLDER|${{ secrets.PROD_FIREBASE_API_KEY }}|g" index.html
          
          # Replace Project ID placeholder with PROD secret (optional, but good practice)
          sed -i "s|FIREBASE_PROJECT_ID_PLACEHOLDER|${{ secrets.PROD_PROJECT_ID }}|g" index.html
          
          # Replace other config placeholders as needed (e.g., authDomain)
          sed -i "s|FIREBASE_AUTH_DOMAIN_PLACEHOLDER|${{ secrets.PROD_AUTH_DOMAIN }}|g" index.html

          # Replace other config placeholders as needed
          sed -i "s|FIREBASE_STORAGE_BUCKET_PLACEHOLDER|${{ secrets.PROD_STORAGE_BUCKET }}|g" index.html
          sed -i "s|FIREBASE_APP_ID_PLACEHOLDER|${{ secrets.PROD_APP_ID }}|g" index.html
          sed -i "s|FIREBASE_MEASUREMENT_ID_PLACEHOLDER|${{ secrets.PROD_MEASUREMENT_ID }}|g" index.html
          sed -i "s|FIREBASE_MESSAGING_SENDERID_PLACEHOLDER|${{ secrets.PROD_MESSAGING_SENDER_ID }}|g" index.html


      - name: 📤 Deploy to Firebase Hosting (Production Live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SNS_MARKET }}
          channelId: live
          projectId: ${{ secrets.PROD_PROJECT_ID }}